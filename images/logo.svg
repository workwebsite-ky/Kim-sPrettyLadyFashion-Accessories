<svg width="220" height="64" viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kim's Pretty Lady Fashion logo">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E6C77E"/>
      <stop offset="0.5" stop-color="#C49A50"/>
      <stop offset="1" stop-color="#9C7531"/>
    </linearGradient>
  </defs>
  <!-- Emblem -->
  <g transform="translate(4,4)">
    <circle cx="28" cy="28" r="27" fill="none" stroke="url(#gold)" stroke-width="1.4"/>
    <circle cx="28" cy="28" r="22" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>
    <text x="28" y="37" font-family="Playfair Display, Georgia, serif" font-size="26" font-weight="700"
          text-anchor="middle" fill="url(#gold)" letter-spacing="-1">KP</text>
    <path d="M14 47 L28 51 L42 47" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.7"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(70,0)">
    <text x="0" y="28" font-family="Playfair Display, Georgia, serif" font-size="20" font-weight="700" fill="#FAF3EC">Kim's Pretty Lady</text>
    <text x="2" y="46" font-family="Jost, Helvetica, sans-serif" font-size="10.5" letter-spacing="4" fill="url(#gold)">FASHION &amp; ACCESSORIES</text>
  </g>
</svg>
